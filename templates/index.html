<!DOCTYPE html>
<html>

<head>

<title>Credit Score Prediction</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.input-box{
display:flex;
flex-direction:column;
}

input{
padding:8px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:10px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1a5dc9;
}

.result-box{
margin-top:20px;
padding:15px;
background:#e8f1ff;
border-radius:8px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>Credit Score Prediction System</h1>

<form method="POST">

<div class="form-grid">

<div class="input-box">
<label>Age</label>
<input type="number" name="age" required>
</div>

<div class="input-box">
<label>Annual Income</label>
<input type="number" name="income" required>
</div>

<div class="input-box">
<label>Number of Bank Accounts</label>
<input type="number" name="bank" required>
</div>

<div class="input-box">
<label>Number of Credit Cards</label>
<input type="number" name="card" required>
</div>

<div class="input-box">
<label>Interest Rate</label>
<input type="number" name="interest" required>
</div>

<div class="input-box">
<label>Number of Loans</label>
<input type="number" name="loan" required>
</div>

<div class="input-box">
<label>Delay From Due Date</label>
<input type="number" name="delay" required>
</div>

<div class="input-box">
<label>Outstanding Debt</label>
<input type="number" name="debt" required>
</div>

<div class="input-box">
<label>Credit Utilization Ratio</label>
<input type="number" step="0.01" name="util" required>
</div>

</div>

<button type="submit">Predict Credit Score</button>

</form>

{% if prediction %}

<div class="result-box">
<strong>Prediction Result:</strong><br>
{{ prediction }}
</div>

{% endif %}

<br><br>

<a href="/dashboard">View Analytics Dashboard</a>

</div>

</body>

</html>
