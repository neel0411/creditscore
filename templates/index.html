<!doctype html>
<html>
  <head>
    <title>Credit Score Prediction</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5fa, #c2e9fb);
        background-size: 400% 400%;
        animation: gradientMove 12s ease infinite;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        width: 1200px;
        padding: 50px;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      }

      h1 {
        text-align: center;
        color: white;
        font-size: 36px;
        margin-bottom: 10px;
      }

      .subtitle {
        text-align: center;
        color: #eee;
        margin-bottom: 40px;
        font-size: 16px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
      }

      .input-box {
        display: flex;
        flex-direction: column;
      }

      .input-box label {
        color: #fff;
        font-weight: 500;
        margin-bottom: 6px;
      }

      .input-box input {
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.9);
        transition: 0.3s;
      }

      .input-box input:focus {
        box-shadow: 0 0 12px rgba(102, 126, 234, 0.6);
      }

      .input-box input:hover {
        transform: scale(1.02);
      }

      button {
        margin-top: 30px;
        width: 100%;
        padding: 16px;
        border-radius: 50px;
        border: none;
        font-size: 18px;
        font-weight: bold;
        color: white;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 114, 255, 0.5);
      }

      .result-box {
        margin-top: 30px;
        padding: 20px;
        text-align: center;
        border-radius: 15px;
        font-size: 20px;
        font-weight: bold;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
      }

      .chart-container {
        margin-top: 40px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 15px;
        text-align: center;
      }

      .chart-container img {
        width: 100%;
        border-radius: 10px;
      }

      .actions {
        text-align: center;
        margin-top: 30px;
      }

      .btn-link {
        display: inline-block;
        margin: 10px;
        padding: 12px 25px;
        border-radius: 50px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
      }

      .footer {
        text-align: center;
        margin-top: 30px;
        color: #eee;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🏦 Credit Score Prediction</h1>
      <div class="subtitle">
        Enter your financial details to predict your credit score
      </div>

      <form method="POST">
        <div class="form-grid">
          <div class="input-box">
            <label>Age</label>
            <input
              type="number"
              name="age"
              value="{{ form_data.get('age', '') }}"
              required
            />
          </div>

          <div class="input-box">
            <label>Annual Income (₹)</label>
            <input
              type="number"
              name="income"
              value="{{ form_data.get('income', '') }}"
              required
            />
          </div>

          <div class="input-box">
            <label>Bank Accounts</label>
            <input
              type="number"
              name="bank"
              value="{{ form_data.get('bank', '') }}"
              required
            />
          </div>

          <div class="input-box">
            <label>Credit Cards</label>
            <input
              type="number"
              name="card"
              value="{{ form_data.get('card', '') }}"
              required
            />
          </div>

          <div class="input-box">
            <label>Interest Rate (%)</label>
            <input
              type="number"
              step="0.1"
              name="interest"
              value="{{ form_data.get('interest', '') }}"
              required
            />
          </div>

          <div class="input-box">
            <label>Number of Loans</label>
            <input
              type="number"
              name="loan"
              value="{{ form_data.get('loan', '') }}"
              required
            />
          </div>

          <div class="input-box">
            <label>Delay (Days)</label>
            <input
              type="number"
              name="delay"
              value="{{ form_data.get('delay', '') }}"
              required
            />
          </div>

          <div class="input-box">
            <label>Outstanding Debt (₹)</label>
            <input
              type="number"
              name="debt"
              value="{{ form_data.get('debt', '') }}"
              required
            />
          </div>

          <div class="input-box">
            <label>Credit Utilization</label>
            <input
              type="number"
              step="0.01"
              name="util"
              value="{{ form_data.get('util', '') }}"
              required
            />
          </div>
        </div>

        <button type="submit">🔮 Predict Credit Score</button>
      </form>

      {% if prediction %}
      <div class="result-box">{{ prediction }}</div>
      {% endif %} {% if chart_exists %}
      <div class="chart-container">
        <h3>Prediction Probability</h3>
        <img src="/static/dynamic_chart.png?{{ range(1,10000)|random }}" />
      </div>
      {% endif %}

      <div class="actions">
        <a href="/dashboard" class="btn-link">📊 View Dashboard</a>
        <a href="/clear" class="btn-link">🔄 Reset</a>
      </div>

      <div class="footer">Credit Score ML System • Flask + Scikit-learn</div>
    </div>
  </body>
</html>
